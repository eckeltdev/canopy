[cmake]
version = "3.15...3.31"
mode = "managed"

[project]
name = "canopy_cpp"
version = "0.1.0"
languages = ["CXX"]
cxx = 23

# The canopy_cpp authoring library: a freestanding builder that emits the Canopy
# op-stream. It reuses the machine-checked wire contract header shipped by canopy-abi
# (crates/canopy-abi/include/canopy_protocol.h) as its single source of op tags / ids.
[target.canopy_cpp]
type = "static"
sources = ["src/build_context.cpp", "src/reactive.cpp"]
include-directories = ["include", "../../crates/canopy-abi/include"]
compile-features = ["cxx_std_23"]

# Host test: builds known trees and asserts the exact wire bytes (byte-for-byte parity
# with canopy-core::Emitter / the protocol).
[target.canopy_cpp_test]
type = "executable"
sources = ["tests/encoder_test.cpp"]
include-directories = ["include", "../../crates/canopy-abi/include"]
compile-features = ["cxx_std_23"]
link-libraries = ["canopy_cpp"]

# DSL parity test: builds trees through the builder DSL and through raw encoder calls and
# asserts the bytes are identical (the P1 cross-check), plus Component/reactive/handler behaviour.
[target.canopy_cpp_dsl_test]
type = "executable"
sources = ["tests/dsl_test.cpp"]
include-directories = ["include", "../../crates/canopy-abi/include"]
compile-features = ["cxx_std_23"]
link-libraries = ["canopy_cpp"]

# inplace_function lifetime test: copy/move/self-assign/moved-from contract (header-only;
# links the library only for a single TU, no canopy_cpp symbols needed).
[target.canopy_cpp_inplace_test]
type = "executable"
sources = ["tests/inplace_function_test.cpp"]
include-directories = ["include", "../../crates/canopy-abi/include"]
compile-features = ["cxx_std_23"]

# Freestanding compile gate: builds a representative DSL tree AND the encoder under
# -fno-exceptions -fno-rtti, so any throw/try/catch/typeid/dynamic_cast in our code (or
# std usage that isn't exception-free-compatible) is a host compile error, not an on-device
# surprise at P5. Compiles src/build_context.cpp directly (not the normal lib) to keep the
# flags isolated from the other targets.
[target.canopy_cpp_freestanding_smoke]
type = "executable"
sources = ["tests/freestanding_smoke.cpp", "src/build_context.cpp", "src/reactive.cpp"]
include-directories = ["include", "../../crates/canopy-abi/include"]
compile-features = ["cxx_std_23"]
compile-options = ["-fno-exceptions", "-fno-rtti"]

# P2 round-trip oracle: links the real Rust engine (libcanopy_abi.a, built by
# `cargo build -p canopy-abi`) and asserts a DSL-built tree, applied through it, yields the
# expected Dom dump. The link dir is relative to the BUILD dir (build/ -> repo target/debug).
[target.canopy_cpp_roundtrip_test]
type = "executable"
sources = ["tests/roundtrip_test.cpp", "src/build_context.cpp", "src/reactive.cpp"]
include-directories = ["include", "../../crates/canopy-abi/include"]
compile-features = ["cxx_std_23"]
link-options = ["-L../../../target/debug", "-lcanopy_abi"]

# P3 event loop: drives pointer input through the real engine and fires the stored C++ handler
# closures. Compiles host.cpp + build_context.cpp directly (NOT linking the canopy_cpp lib, to
# avoid an ODR double-definition) and links libcanopy_abi.a (needs `cargo build -p canopy-abi`).
[target.canopy_cpp_event_test]
type = "executable"
sources = ["tests/event_loop_test.cpp", "src/host.cpp", "src/build_context.cpp", "src/reactive.cpp"]
include-directories = ["include", "../../crates/canopy-abi/include"]
compile-features = ["cxx_std_23"]
link-options = ["-L../../../target/debug", "-lcanopy_abi"]

# Worked example: a counter-card component authored with the DSL, applied through the real
# engine, its Dom dump printed (and self-verified). Links libcanopy_abi.a like the round-trip
# test, so it needs `cargo build -p canopy-abi` first.
[target.canopy_cpp_counter_example]
type = "executable"
sources = ["examples/counter_card/main.cpp", "src/build_context.cpp", "src/reactive.cpp"]
include-directories = ["include", "../../crates/canopy-abi/include"]
compile-features = ["cxx_std_23"]
link-options = ["-L../../../target/debug", "-lcanopy_abi"]

# P4 fine-grained reactivity proof: mount a reactive text node, apply through the real engine,
# snapshot; set the signal, FLUSH, take_batch; assert exactly ONE SetText op (tag 0x14) and ZERO
# structural ops; apply that surgical batch to the SAME host; snapshot shows the new value. Links
# libcanopy_abi.a like the round-trip test (needs `cargo build -p canopy-abi`), plus host.cpp for
# the pump/event path.
[target.canopy_cpp_reactive_test]
type = "executable"
sources = ["tests/reactive_test.cpp", "src/host.cpp", "src/build_context.cpp", "src/reactive.cpp"]
include-directories = ["include", "../../crates/canopy-abi/include"]
compile-features = ["cxx_std_23"]
link-options = ["-L../../../target/debug", "-lcanopy_abi"]

# P5 "binding runs ON frt" proof: compiles the binding (build_context.cpp + reactive.cpp) together
# with frt's platform seam and its global operator new/delete BY SOURCE — the new/delete operators
# are emitted ONLY here, gated by FRT_OWN_NEW_DELETE (mirroring frt's own frt_new_delete_test;
# they are never in the frt static lib). The frt sources come from the sibling runtime/frt tree
# via relative paths; its headers via ../../runtime/frt/include. NO libcanopy_abi link — this is
# allocator routing, not the engine. The test installs frt's debug-tracking backend, builds a DSL
# tree, asserts the wire bytes are unchanged, and proves the binding's std containers allocated
# through frt_platform_alloc (alloc_count rose, the live set balanced after teardown).
[target.canopy_cpp_on_frt_test]
type = "executable"
sources = [
    "tests/on_frt_test.cpp",
    "src/build_context.cpp",
    "src/reactive.cpp",
    "../../runtime/frt/src/new_delete.cpp",
    "../../runtime/frt/src/platform.cpp",
    "../../runtime/frt/src/backend_host_posix.cpp",
    "../../runtime/frt/src/backend_debug_tracking.cpp",
]
include-directories = ["include", "../../crates/canopy-abi/include", "../../runtime/frt/include"]
compile-features = ["cxx_std_23"]
compile-options = ["-DFRT_OWN_NEW_DELETE"]

# The end-to-end "C++ DSL on frt -> real engine -> PIXELS" demo: authors an inline-styled GUI with
# the DSL, applies it through the engine (host.cpp), renders to an RGBA8 framebuffer via the new
# canopy_host_render_rgba, and writes a PPM. Links libcanopy_abi.a (needs `cargo build -p
# canopy-abi`); compiles host.cpp + build_context.cpp + reactive.cpp directly like the event test.
[target.canopy_cpp_gui_example]
type = "executable"
sources = ["examples/gui_render/main.cpp", "src/host.cpp", "src/build_context.cpp", "src/reactive.cpp"]
include-directories = ["include", "../../crates/canopy-abi/include"]
compile-features = ["cxx_std_23"]
link-options = ["-L../../../target/debug", "-lcanopy_abi"]
