version: 1

profile: strict-systems

project:
  name: canopy_cpp
  language_standard: c++23
  build_dir: build
  compile_commands: build/compile_commands.json

paths:
  include:
    - src
    - include
  exclude:
    - build
    - third_party
    - vendor
    - generated

format:
  enabled: true
  style_file: .clang-format

tidy:
  enabled: true
  config_file: .clang-tidy
  warnings_as_errors: false
  fix: false
  jobs: auto

rules:
  naming:
    enabled: true
  headers:
    enabled: true
  ownership:
    enabled: true
  dangerous_patterns:
    enabled: true
  concurrency:
    enabled: true
  comments:
    enabled: true
  layout:
    enabled: true

doctor:
  require_compile_commands: false
  require_sanitizer_targets: false
  require_ci: false

output:
  default_format: rich
  reports_dir: .cpp-doctor/reports
