name: Stylo conformance

# The Stylo tier (canopy-style-stylo) and its WPT runner (canopy-wpt) live
# OUTSIDE the core workspace (root Cargo.toml `exclude`) because Stylo drags in a
# large std-only tree that must never leak into the no_std core. They carry their
# own Cargo.lock and build only on nightly. The main `ci.yml` builds the workspace
# on stable and never touches these crates, so this dedicated workflow covers them.
#
# Three jobs:
#   1. stylo-build-test — build + test canopy-style-stylo on the pinned nightly.
#      The browser-oracle / layout-oracle tests are no longer `#[ignore]`d: they
#      auto-SKIP (no-op pass) when no Chrome is present, so the default
#      `cargo test` RUNs them but they harmlessly skip on this browser-less runner.
#   2. wpt-regression — fetch a small WPT subset and run canopy-wpt --check against
#      the COMMITTED baselines for css-flexbox and css-grid, failing on regression.
#   3. chrome-oracle (NON-BLOCKING, continue-on-error) — run the browser/layout
#      oracle tests against the Chrome that ubuntu-latest ships, giving a standing
#      browser-accuracy signal without gating the required jobs.

on:
  push:
    branches: [main, master]
    paths:
      - "crates/canopy-style-stylo/**"
      - "crates/canopy-wpt/**"
      - ".github/workflows/stylo.yml"
  pull_request:
    paths:
      - "crates/canopy-style-stylo/**"
      - "crates/canopy-wpt/**"
      - ".github/workflows/stylo.yml"
  # Allow manual runs (e.g. to refresh after a known-good baseline bump).
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # The nightly that the Stylo + Taffy stack is verified against locally
  # (`cargo +nightly --version` -> nightly d811228b1, 2025-04-15). Pinned so a
  # future nightly regression in the toolchain can't turn CI red out of nowhere.
  NIGHTLY: nightly-2025-04-15
  # The WPT subset we test against — must cover both suites plus their shared
  # support assets and the Ahem/test fonts the pages reference.
  WPT_REF: master

jobs:
  # ----------------------------------------------------------------------------
  # 1. Build and test the excluded Stylo engine crate on the pinned nightly.
  # ----------------------------------------------------------------------------
  stylo-build-test:
    name: build + test canopy-style-stylo (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.NIGHTLY }}
          components: rustfmt, clippy

      # Cache the (large) Stylo dependency tree keyed on the crate's own lockfile.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/canopy-style-stylo

      - name: fmt
        working-directory: crates/canopy-style-stylo
        run: cargo +${{ env.NIGHTLY }} fmt --check

      - name: clippy
        working-directory: crates/canopy-style-stylo
        run: cargo +${{ env.NIGHTLY }} clippy --all-targets -- -D warnings

      # Default test run: the Chrome-dependent oracles are no longer `#[ignore]`d,
      # but they auto-SKIP (no-op pass) when no Chrome is found, so on this
      # browser-less runner this builds the engine and exercises the offline
      # cascade/layout unit tests while the oracles run-but-skip. The real browser
      # comparison happens in the non-blocking chrome-oracle job below.
      - name: test (offline; Chrome oracles run-but-skip without a browser)
        working-directory: crates/canopy-style-stylo
        run: cargo +${{ env.NIGHTLY }} test

  # ----------------------------------------------------------------------------
  # 2. WPT regression gate: run canopy-wpt --check against committed baselines.
  # ----------------------------------------------------------------------------
  wpt-regression:
    name: WPT --check vs committed baselines (flexbox + grid)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.NIGHTLY }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/canopy-wpt

      # How CI gets the WPT checkout: a SHALLOW, BLOBLESS, SPARSE clone of the
      # upstream repo restricted to exactly the paths the two suites need. This is
      # the same subset present at /tmp/wpt locally:
      #   * css/css-flexbox, css/css-grid — the suites under test
      #   * css/reference                 — shared reference pages the REF tests
      #                                     `<link rel="match">` to (many flexbox
      #                                     reftests point at css/reference/*-ref.*).
      #                                     Without it those tests can't render-compare
      #                                     and the runner reports them as INFRA skips
      #                                     ("reference file unreadable"); WITH it they
      #                                     become real PASS/FAIL render-compares.
      #   * css/support                   — shared stylesheets the tests @import
      #   * fonts                         — Ahem.ttf etc. the pages reference
      # --depth 1 + --filter=blob:none keeps the download to a few MB rather than
      # cloning the entire multi-gigabyte WPT history.
      - name: Fetch WPT subset (shallow + sparse)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/web-platform-tests/wpt.git /tmp/wpt
          cd /tmp/wpt
          git sparse-checkout set \
            css/css-flexbox \
            css/css-grid \
            css/reference \
            css/support \
            fonts
          echo "css-flexbox tests:" && find css/css-flexbox -name '*.html' | wc -l
          echo "css-grid tests:"    && find css/css-grid    -name '*.html' | wc -l

      - name: Build runner
        working-directory: crates/canopy-wpt
        run: cargo +${{ env.NIGHTLY }} build --release

      # The regression gate. `--check` re-runs the suite and exits non-zero if any
      # test that the committed baseline marks PASS is no longer PASS. Improvements
      # (more tests passing than the baseline) are reported but never fail CI; to
      # lock them in, regenerate the baseline with --write-baseline.
      #
      # The committed baselines must be regenerated HERE in CI (run this job's
      # fetch + build, then `./target/release/canopy-wpt <suite> --write-baseline
      # expectations/<suite>.txt` and commit the result), NOT in a local checkout
      # that lacks the css/reference tree — otherwise the flexbox REF tests bake
      # in "reference file unreadable" INFRA skips instead of the real PASS/FAIL
      # render-compares that the now-present css/reference path produces.
      - name: css-flexbox regression check
        working-directory: crates/canopy-wpt
        env:
          WPT_DIR: /tmp/wpt
        run: |
          ./target/release/canopy-wpt /tmp/wpt/css/css-flexbox \
            --check expectations/css-flexbox.txt

      - name: css-grid regression check
        working-directory: crates/canopy-wpt
        env:
          WPT_DIR: /tmp/wpt
        run: |
          ./target/release/canopy-wpt /tmp/wpt/css/css-grid \
            --check expectations/css-grid.txt

  # ----------------------------------------------------------------------------
  # 3. NON-BLOCKING Chrome browser-oracle lane.
  #
  # The browser-oracle / layout-oracle tests in canopy-style-stylo shell out to a
  # real Chrome and compare our Stylo cascade + Stylo->Taffy layout against
  # getComputedStyle / getBoundingClientRect. They are no longer #[ignore]d (they
  # auto-SKIP when no Chrome is present), so here we run them on ubuntu-latest,
  # which ships Chrome preinstalled, to get a STANDING browser-accuracy signal.
  #
  # `continue-on-error: true` makes the whole job non-blocking: a browser-oracle
  # mismatch (or a Chrome/CI flake) surfaces as a yellow/❌ annotation on this job
  # but NEVER turns the required gate red. To promote it to a required check,
  # drop the continue-on-error and add it to branch protection.
  # ----------------------------------------------------------------------------
  chrome-oracle:
    name: Stylo vs Chrome oracle (non-blocking)
    runs-on: ubuntu-latest
    # Non-blocking: report the browser-accuracy signal without gating CI.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.NIGHTLY }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/canopy-style-stylo

      # ubuntu-latest preinstalls Chrome; this action makes the resolved binary
      # available on PATH (and is a no-op if one is already present), so the
      # oracle's Chrome auto-discovery finds it and the tests actually RUN rather
      # than SKIP. CANOPY_CHROME pins the binary the harness shells out to.
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      # Both oracle tests run by default now (no --ignored needed). With Chrome on
      # PATH they perform the real comparison; without it they would no-op SKIP.
      - name: browser + layout oracle vs Chrome
        working-directory: crates/canopy-style-stylo
        env:
          CANOPY_CHROME: chrome
        run: |
          cargo +${{ env.NIGHTLY }} test --test browser_oracle --test layout_oracle -- --nocapture
