[package]
name = "canopy-plugin-counter"
description = "Example untrusted Canopy guest, compiled to wasm32-unknown-unknown: builds a tiny UI op-stream and hands it to the host via the single granted `canopy_apply` import."
version = "0.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

# This guest is intentionally OUTSIDE the core workspace (see the root Cargo.toml
# `exclude`). It targets `wasm32-unknown-unknown` and is built by
# `canopy-transport-wasmtime`'s build.rs into that crate's OUT_DIR; it is never part
# of a desktop `cargo build`. It does NOT inherit the workspace `unsafe_code = "deny"`
# lint because the one host import is, by definition, an `unsafe extern "C"` call.

# Stand alone as its own one-crate workspace. The guest is excluded from the core
# workspace, and because this manifest can sit nested under a worktree checkout, an
# empty `[workspace]` table pins it so cargo never walks up into an outer workspace.
[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
canopy-core = { path = "../../crates/canopy-core" }
canopy-protocol = { path = "../../crates/canopy-protocol" }
canopy-paint = { path = "../../crates/canopy-paint" }

[profile.release]
# A panic must never unwind across the wasm FFI boundary; abort instead. `opt-level
# = "s"` keeps the produced module small.
panic = "abort"
opt-level = "s"
