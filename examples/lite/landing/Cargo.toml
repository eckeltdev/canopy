[package]
name = "canopy-lite-landing"
description = "The LITE (CPU-rasterized) Canopy landing: the shared one-page animated landing tree (canopy-landing-ui) rendered with the software path — canopy-render-text + the baked/parley text engine, no GPU. The constrained-tier twin of canopy-full-landing. Design inspiration: x.ai."
version = "0.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false
default-run = "canopy-lite-landing"

# Excluded from the core workspace (see the root Cargo.toml `exclude`) so the no_std
# core never inherits winit/softbuffer. From this directory:
#   cargo run                                       # the animated window (CPU-rasterized)
#   cargo run --no-default-features --bin render    # a settled still -> PPM, on the CPU

[dependencies]
# The shared landing UI tree + animation timeline (authored once; the GPU twin uses the
# same crate). Two dirs up to examples/, then into common/.
canopy-landing-ui = { path = "../../common/landing-ui" }
# Render-side types, the sharp-text CPU renderer (alpha-compositing, so fades work), and
# the text engine it rasterizes glyphs with. Three dirs up to the repo root.
canopy-traits = { path = "../../../crates/canopy-traits" }
canopy-render-text = { path = "../../../crates/canopy-render-text" }
canopy-text-parley = { path = "../../../crates/canopy-text-parley" }
# The authoring layer, for `Dom` in the binaries.
canopy-ui = { path = "../../../crates/canopy-ui" }

winit = { version = "0.30", optional = true }
softbuffer = { version = "0.4", optional = true }

[features]
default = ["window"]
window = ["dep:winit", "dep:softbuffer"]

[[bin]]
name = "render"
path = "src/bin/render.rs"

[[bin]]
name = "canopy-lite-landing"
path = "src/bin/window.rs"
required-features = ["window"]

# Pin the workspace boundary (standalone example; see canopy-welcome for the why).
[workspace]

# Optimize DEPENDENCIES even in a dev (`cargo run`) build, while keeping this crate
# itself unoptimized for fast incremental builds. The per-frame cost lives almost
# entirely in the software rasterizer + cosmic-text (dependencies), so an unoptimized
# debug build of them is ~50x slower (≈25 ms/frame vs ≈0.5 ms) and the window feels
# laggy. This is the standard fix for real-time/graphics dev: `cargo run` stays smooth,
# `cargo run --release` is still fastest.
[profile.dev.package."*"]
opt-level = 3
