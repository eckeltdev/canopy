[package]
name = "canopy-full-stylo"
description = "Full-tier demonstration: a real Servo-Stylo CSS cascade (canopy-style-stylo) drives Canopy rendering. Builds a styled tree, resolves each node's ComputedStyle through Stylo (inheritance + specificity + descendant combinators — things the lite class-only engine cannot do), and rasterizes the result with the CPU software renderer. A windowed binary (winit + softbuffer) hot-reloads styles.css live; a headless `render` binary writes a PPM."
version = "0.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false
default-run = "canopy-full-stylo"

# Standalone, excluded from the core workspace (it depends on the heavy, std-only
# canopy-style-stylo). From this directory:
#   cargo run                                       # the live window (hot-reloads styles.css)
#   cargo run --no-default-features --bin render    # a still -> PPM

[dependencies]
# The full-tier StyleEngine: real Stylo cascade -> canopy ComputedStyle.
canopy-style-stylo = { path = "../../../crates/canopy-style-stylo" }
# The flat style PAL (ComputedStyle/Color/Display + the StyleEngine trait) and NodeId.
canopy-traits = { path = "../../../crates/canopy-traits" }
canopy-protocol = { path = "../../../crates/canopy-protocol" }
# The lite CPU software rasterizer used to draw the resolved styles.
canopy-render-soft = { path = "../../../crates/canopy-render-soft" }

winit = { version = "0.30", optional = true }
softbuffer = { version = "0.4", optional = true }

[features]
default = ["window"]
window = ["dep:winit", "dep:softbuffer"]

[lib]
path = "src/lib.rs"

[[bin]]
name = "render"
path = "src/bin/render.rs"

[[bin]]
name = "canopy-full-stylo"
path = "src/bin/window.rs"
required-features = ["window"]

# Pin the workspace boundary (standalone example; own lockfile).
[workspace]

[profile.dev.package."*"]
opt-level = 3
