[package]
name = "canopy-full-landing"
description = "The FULL (GPU-rasterized) Canopy landing: the same shared one-page animated landing tree (canopy-landing-ui) as canopy-lite-landing, but the window rasterizes on the GPU via canopy-render-vello (wgpu → Metal on macOS) instead of the CPU software path. The capable-tier twin. Design inspiration: x.ai."
version = "0.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false
default-run = "canopy-full-landing"

# Excluded from the core workspace (see the root Cargo.toml `exclude`) so the no_std
# core never inherits winit/wgpu. From this directory:
#   cargo run                                       # the animated window (GPU-rasterized)
#   cargo run --no-default-features --bin render    # a settled still -> PPM, on the GPU

[dependencies]
# The shared landing UI tree + animation timeline (authored once; the CPU twin uses the
# same crate). Two dirs up to examples/, then into common/.
canopy-landing-ui = { path = "../../common/landing-ui" }
# Render-side types (Color/Size/Renderer trait), the layout engine that lowers the
# settled DOM to a DisplayList, and the GPU renderer that rasterizes it. Three dirs up
# to the repo root.
canopy-traits = { path = "../../../crates/canopy-traits" }
canopy-layout-taffy = { path = "../../../crates/canopy-layout-taffy" }
canopy-render-vello = { path = "../../../crates/canopy-render-vello" }
# The authoring layer, for `Dom` in the binaries.
canopy-ui = { path = "../../../crates/canopy-ui" }

winit = { version = "0.30", optional = true }
softbuffer = { version = "0.4", optional = true }

[features]
default = ["window"]
window = ["dep:winit", "dep:softbuffer"]

[[bin]]
name = "render"
path = "src/bin/render.rs"

[[bin]]
name = "canopy-full-landing"
path = "src/bin/window.rs"
required-features = ["window"]

# Pin the workspace boundary (standalone example; see canopy-welcome for the why).
[workspace]

# Optimize DEPENDENCIES even in a dev (`cargo run`) build, while keeping this crate
# itself unoptimized for fast incremental builds. The per-frame cost lives almost
# entirely in the GPU renderer's deps (wgpu, naga) + cosmic-text (dependencies), so an
# unoptimized debug build of them is dramatically slower and the window feels laggy.
# This is the standard fix for real-time/graphics dev: `cargo run` stays smooth,
# `cargo run --release` is still fastest.
[profile.dev.package."*"]
opt-level = 3
