[package]
name = "canopy-landing"
description = "A stunning, one-page (no-scroll) Canopy landing screen — dark, minimal, and animated, with a staggered fade + slide-up entrance and an ambient pulsing dot row. Design inspiration: x.ai. Built entirely on Canopy: opacity + translate + alpha compositing, flex alignment, and the canopy-anim timeline."
version = "0.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false
default-run = "canopy-landing"

# Excluded from the core workspace (see the root Cargo.toml `exclude`) so the no_std
# core never inherits winit/softbuffer. From this directory:
#   cargo run                                  # the animated window
#   cargo run --no-default-features --bin render   # a settled still -> PPM

[dependencies]
# The batteries-included authoring layer (Ui + rsx!), which re-exports the core.
canopy-ui = { path = "../../crates/canopy-ui" }
# Render-side types + the sharp-text renderer (now alpha-compositing, so fades work).
canopy-traits = { path = "../../crates/canopy-traits" }
canopy-render-soft = { path = "../../crates/canopy-render-soft" }
canopy-render-text = { path = "../../crates/canopy-render-text" }
canopy-text-parley = { path = "../../crates/canopy-text-parley" }
# The animation timeline (tweens with delay + repeat) and the paint PropId consts
# (OPACITY, TRANSLATE_Y, WIDTH) the entrance animations bind to.
canopy-anim = { path = "../../crates/canopy-anim" }
canopy-paint = { path = "../../crates/canopy-paint" }

winit = { version = "0.30", optional = true }
softbuffer = { version = "0.4", optional = true }

[features]
default = ["window"]
window = ["dep:winit", "dep:softbuffer"]

[lib]
path = "src/lib.rs"

[[bin]]
name = "render"
path = "src/bin/render.rs"

[[bin]]
name = "canopy-landing"
path = "src/bin/window.rs"
required-features = ["window"]

# Pin the workspace boundary (standalone example; see canopy-welcome for the why).
[workspace]

# Optimize DEPENDENCIES even in a dev (`cargo run`) build, while keeping this crate
# itself unoptimized for fast incremental builds. The per-frame cost lives almost
# entirely in the software rasterizer + cosmic-text (dependencies), so an unoptimized
# debug build of them is ~50x slower (≈25 ms/frame vs ≈0.5 ms) and the window feels
# laggy. This is the standard fix for real-time/graphics dev: `cargo run` stays smooth,
# `cargo run --release` is still fastest.
[profile.dev.package."*"]
opt-level = 3
