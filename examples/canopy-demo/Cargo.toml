[package]
name = "canopy-demo"
description = "Example Canopy app: a click-driven counter + list. Headless `render` binary plus a windowed macOS/desktop binary (winit + softbuffer)."
version = "0.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false
# `cargo run` launches the window; the headless renderer is `cargo run --bin render`.
default-run = "canopy-demo"
# build.rs compiles the untrusted wasm plugin so the demo can host it in a panel.
build = "build.rs"

# This example is intentionally OUTSIDE the core workspace (see the root
# Cargo.toml `exclude`) so the no_std core never inherits winit/softbuffer.
# Build the windowed app:   cargo run            (from this directory)
# Render a frame headless:  cargo run --no-default-features --bin render

[dependencies]
canopy-protocol = { path = "../../crates/canopy-protocol" }
canopy-traits = { path = "../../crates/canopy-traits" }
canopy-dom = { path = "../../crates/canopy-dom" }
canopy-view = { path = "../../crates/canopy-view" }
canopy-signals = { path = "../../crates/canopy-signals" }
canopy-render-soft = { path = "../../crates/canopy-render-soft" }
# Sharp, antialiased glyphs: the capable-tier renderer that drives both binaries'
# base frame (replacing the baked 8x8 software font path).
canopy-render-text = { path = "../../crates/canopy-render-text" }
# The text engine itself, so the windowed loop can hold one `TextEngine` and reuse
# its shaping/rasterization caches across redraws (via `render_dom_with`).
canopy-text-parley = { path = "../../crates/canopy-text-parley" }
canopy-layout-taffy = { path = "../../crates/canopy-layout-taffy" }
canopy-style-css = { path = "../../crates/canopy-style-css" }
canopy-input = { path = "../../crates/canopy-input" }
# Host an untrusted wasm plugin in a panel.
canopy-transport-wasmtime = { path = "../../crates/canopy-transport-wasmtime" }
canopy-plugin-panel = { path = "../../crates/canopy-plugin-panel" }

winit = { version = "0.30", optional = true }
softbuffer = { version = "0.4", optional = true }
# Optional GPU render path for the windowed binary (best-effort, off by default).
# Gated behind the `gpu` feature so the default build pulls in no wgpu/Metal stack.
canopy-render-vello = { path = "../../crates/canopy-render-vello", optional = true }

[features]
default = ["window"]
window = ["dep:winit", "dep:softbuffer"]
# Opt into the wgpu/vello GPU render path in the windowed binary. It is strictly a
# fallback/demonstration, never the default: vello rasterizes only the BAKED 8x8
# font (it drops the sharp cosmic-text glyphs), so the CPU sharp-text path stays the
# default. See `window.rs` for the limitation and the runtime `--gpu` toggle.
gpu = ["window", "dep:canopy-render-vello"]

[lib]
path = "src/lib.rs"

# Always available, no windowing deps: renders one frame to a PPM.
[[bin]]
name = "render"
path = "src/bin/render.rs"

# The windowed app; needs the `window` feature (on by default).
[[bin]]
name = "canopy-demo"
path = "src/bin/window.rs"
required-features = ["window"]

# Make this excluded example its own standalone workspace root. The root Cargo.toml
# already `exclude`s it, but when the repo is checked out *inside* another directory
# tree (e.g. a git worktree nested under the main checkout) Cargo can otherwise walk
# up past this package and bind it to an outer workspace it isn't a member of. An
# empty `[workspace]` table pins the boundary here so `cargo build`/`run` works from
# this directory in every layout.
[workspace]
